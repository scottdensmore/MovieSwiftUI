name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Minimum GITHUB_TOKEN scope. All jobs here just check out the repo,
# run xcodebuild, and upload artifacts via `actions/upload-artifact`
# (which writes to action storage, not the repo) — so `contents: read`
# (for `actions/checkout`) is enough. Narrowing the token's blast
# radius is a CodeQL workflow-security recommendation.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  COVERAGE_THRESHOLDS_FILE: ${{ github.workspace }}/scripts/ci/coverage_thresholds.env

jobs:
  package-tests:
    runs-on: macos-26
    env:
      COVERAGE_REPORT_DIR: ${{ github.workspace }}/.ci-artifacts/coverage

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the set_build_number build phase's
          # `git rev-list --count HEAD` yields the real build number; a
          # default shallow clone would stamp 1.
          fetch-depth: 0

      - name: Xcode version
        run: /usr/bin/xcodebuild -version

      - name: Package tests + coverage gate
        run: ./scripts/ci/check_coverage.sh

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: ${{ env.COVERAGE_REPORT_DIR }}

  ios-tests:
    needs: package-tests
    runs-on: macos-26
    env:
      XCODE_TEST_RESULT_BUNDLE_PATH: ${{ github.workspace }}/.ci-artifacts/test-results/MovieSwift.xcresult
      XCODE_DERIVED_DATA_PATH: ${{ github.workspace }}/.ci-artifacts/derived-data
      COVERAGE_REPORT_DIR: ${{ github.workspace }}/.ci-artifacts/coverage-app
      IOS_SIMULATOR_FAMILY: iPhone
      IOS_SIMULATOR_NAME: "iPhone 17 Pro"
      IOS_TEST_ITERATIONS: "1"
      XCODE_ONLY_TESTING: MovieSwiftTests

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the set_build_number build phase's
          # `git rev-list --count HEAD` yields the real build number; a
          # default shallow clone would stamp 1.
          fetch-depth: 0

      - name: Xcode version
        run: /usr/bin/xcodebuild -version

      - name: iOS app tests (unit suite)
        run: ./scripts/ci/run_ios_tests.sh

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-results
          path: ${{ env.XCODE_TEST_RESULT_BUNDLE_PATH }}

      - name: Upload test diagnostics logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-logs
          path: ${{ env.XCODE_DERIVED_DATA_PATH }}/Logs/Test

      - name: Upload app coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-coverage-reports
          path: ${{ env.COVERAGE_REPORT_DIR }}

  ios-tests-ipad:
    needs: package-tests
    runs-on: macos-26
    env:
      XCODE_TEST_RESULT_BUNDLE_PATH: ${{ github.workspace }}/.ci-artifacts/test-results/MovieSwift-iPad.xcresult
      XCODE_DERIVED_DATA_PATH: ${{ github.workspace }}/.ci-artifacts/derived-data-ipad
      IOS_SIMULATOR_FAMILY: iPad
      IOS_SIMULATOR_NAME: "iPad (A16)"
      IOS_TEST_ITERATIONS: "1"
      XCODE_ONLY_TESTING: MovieSwiftUITests/MovieSwiftUITests/testLaunchShowsMainTabs,MovieSwiftTests

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the set_build_number build phase's
          # `git rev-list --count HEAD` yields the real build number; a
          # default shallow clone would stamp 1.
          fetch-depth: 0

      - name: Xcode version
        run: /usr/bin/xcodebuild -version

      - name: iPad app tests (XCTest + UI smoke)
        run: ./scripts/ci/run_ios_tests.sh

      - name: Upload iPad test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-results-ipad
          path: ${{ env.XCODE_TEST_RESULT_BUNDLE_PATH }}

      - name: Upload iPad test diagnostics logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-logs-ipad
          path: ${{ env.XCODE_DERIVED_DATA_PATH }}/Logs/Test

  mac-tests:
    needs: package-tests
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the set_build_number build phase's
          # `git rev-list --count HEAD` yields the real build number; a
          # default shallow clone would stamp 1.
          fetch-depth: 0

      - name: Prepare macOS for UI testing
        uses: paulz/prepare-macos@v1

      - name: Xcode version
        run: /usr/bin/xcodebuild -version

      - name: macOS app tests (unit + UI)
        run: |
          xcodebuild test \
            -project MovieSwift/MovieSwift.xcodeproj \
            -scheme MovieSwiftMac \
            -destination "platform=macOS" \
            -parallel-testing-enabled NO \
            -retry-tests-on-failure \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

  tvos-tests:
    needs: package-tests
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the set_build_number build phase's
          # `git rev-list --count HEAD` yields the real build number; a
          # default shallow clone would stamp 1.
          fetch-depth: 0

      - name: Xcode version
        run: /usr/bin/xcodebuild -version

      - name: tvOS app tests (unit + UI)
        run: |
          xcodebuild test \
            -project MovieSwift/MovieSwift.xcodeproj \
            -scheme MovieSwiftTV \
            -destination "platform=tvOS Simulator,name=Apple TV" \
            -retry-tests-on-failure \
            CODE_SIGNING_ALLOWED=NO
