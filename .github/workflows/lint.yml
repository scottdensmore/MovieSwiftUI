name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Same minimum-scope token the other workflows use: only need to read
# the checkout, no writes.
permissions:
  contents: read

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swiftlint:
    name: SwiftLint
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v4

      # Pin SwiftLint to an exact version so CI and local runs agree.
      # `brew install swiftlint` is unpinned and the runner image can lag
      # behind Homebrew's current formula (it shipped 0.63.2 while devs
      # had 0.63.3) — and 0.63.3 changed force_unwrapping to stop flagging
      # static `URL(string: "literal")!`, so an unpinned runner produced
      # "passes locally, fails CI" drift. Download the exact release
      # binary instead. Keep SWIFTLINT_VERSION in sync with the Brewfile.
      - name: Install SwiftLint
        env:
          SWIFTLINT_VERSION: 0.63.3
        run: |
          curl -fsSL -o /tmp/swiftlint.zip \
            "https://github.com/realm/SwiftLint/releases/download/${SWIFTLINT_VERSION}/portable_swiftlint.zip"
          unzip -o -q /tmp/swiftlint.zip -d /tmp/swiftlint
          echo "/tmp/swiftlint" >> "$GITHUB_PATH"

      - name: SwiftLint version
        run: swiftlint version

      # `--strict` promotes warnings to errors, matching the local
      # `scripts/lint.sh` default. The repo-root `.swiftlint.yml` is
      # the single source of configuration.
      - name: Run SwiftLint
        run: ./scripts/lint.sh
