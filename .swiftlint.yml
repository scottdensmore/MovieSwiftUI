# SwiftLint configuration for MovieSwiftUI.
# Rule reference: https://realm.github.io/SwiftLint/rule-directory.html
#
# Goal: catch real Swift bugs and inconsistencies without nitpicking the
# Redux + SwiftUI patterns that dominate this codebase (long reducer
# switches, multi-trailing-closure SwiftUI builders, TMDB-API-derived
# snake_case property names, long View bodies).
#
# Thresholds are tuned so the current codebase passes `--strict`; tighten
# in follow-up PRs as files get cleaned up. Per-file inline disables
# document the specific outliers (giant reducer switch, font-name
# factories, TMDB schema struct name kept for backwards compatibility).

# Lint these roots.
included:
  - MovieSwift

# Skip generated / build artifacts / asset catalogs / preview content.
excluded:
  - "**/.build"
  - "**/DerivedData"
  - "**/*.generated.swift"
  - "MovieSwift/MovieSwift/Assets.xcassets"
  - "MovieSwift/MovieSwiftMac/Assets.xcassets"
  - "MovieSwift/MovieSwiftTV/Assets.xcassets"
  - "MovieSwift/MovieSwift/Preview Content"
  - "MovieSwift/MovieSwiftMac/Preview Content"
  - "MovieSwift/MovieSwiftTV/Preview Content"

opt_in_rules:
  - first_where
  - last_where
  - sorted_first_last
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - yoda_condition
  # `force_unwrapping` catches new `!` force-unwraps. The few remaining
  # legitimate sites (static-URL construction, #Preview sample
  # fixtures, and test fixtures with known-good literal inputs) carry
  # an inline `// swiftlint:disable:next force_unwrapping` annotation
  # with a one-line reason at the offending site.
  - force_unwrapping

disabled_rules:
  # SwiftUI ViewBuilders and presentation modifiers (.sheet, .alert,
  # .confirmationDialog, .toolbar...) routinely take multiple trailing
  # closures by design. The rule fires across the entire views layer
  # and adds no signal.
  - multiple_closures_with_trailing_closure
  # Cosmetic; doesn't catch real defects in this codebase.
  - vertical_parameter_alignment

# TMDB API model fields are snake_case to mirror the JSON; short
# loop / coordinate identifiers (`id`, `i`, `dx`, `dy`, `f`, `a`, `b`,
# `c`, `s`, `v`...) show up legitimately in reducers, SwiftUI ForEach
# loops, and Redux test fixtures.
identifier_name:
  min_length:
    warning: 1
    error: 0
  excluded:
    - id
  allowed_symbols:
    - "_"
  validates_start_with_lowercase: warning

# SwiftUI view bodies and Redux action argument lists routinely run
# 140-200 chars. The hard limit catches truly egregious lines.
line_length:
  warning: 200
  error: 400
  ignores_urls: true
  ignores_comments: true
  ignores_function_declarations: true
  ignores_interpolated_strings: true

# SwiftUI view-body functions and Redux reducer cases naturally get
# long. Tuned to catch the worst offenders without nitpicking normal
# screen-sized views.
function_body_length:
  warning: 200
  error: 500

# Large SwiftUI screens (MovieDetail, SettingsForm) intentionally hold
# their related modifiers in one struct body. Test files grow too.
type_body_length:
  warning: 1500
  error: 5000

# MovieDetail.swift / SettingsForm.swift are >1000 lines by design.
file_length:
  warning: 2000
  error: 5000
  ignore_comment_only_lines: true

# Constructors that mirror TMDB JSON payloads can hit ~10 fields.
function_parameter_count:
  warning: 10
  error: 12

# The MoviesReducer switch dispatches across all Redux actions in
# one function — high cyclomatic complexity is intrinsic to the
# reducer pattern. Per-site inline disable on that function.
cyclomatic_complexity:
  warning: 30
  error: 50

# Mandatory trailing commas in multi-line collection literals match
# the modern Swift Testing / SwiftUI style used in newer code.
trailing_comma:
  mandatory_comma: true

# Surface TODOs as warnings (so they show up in PRs) without blocking
# the build.
todo:
  severity: warning

reporter: "xcode"
